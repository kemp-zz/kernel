name: Compile OpenWrt kernel 6.1.86-1-58955783205c88e28ca2f240287756a0

on:
  repository_dispatch:
  workflow_dispatch:

env:
  TZ: America/New_York

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) 2>/dev/null
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://is.gd/depend_ubuntu2204_armbian)
          sudo -E systemctl daemon-reload
          #sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

          
      - name: Create simulated physical disk
         
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder
          df -Th
          
      - name: Create a mapped directory
       
        working-directory: /builder
        run: |
          df -hT ${PWD}
          mkdir -p /home/runner/work/_actions/ophub/amlogic-s9xxx-armbian/main/compile-kernel
          ln -sf /builder/config /home/runner/work/_actions/ophub/amlogic-s9xxx-armbian/main/compile-kernel/config
          echo "status=success" >> ${GITHUB_OUTPUT}
          
      - name: Create config file
        run: |
          touch /builder/config
          
      - name: Download kmod metadata
        run: |
          if [[ -n "${NVM_DIR}" ]]; then
            sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          fi
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

          
      - name: Create simulated physical disk
    
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder
          df -Th

          
      - name: Create a mapped directory
     
        working-directory: /builder
        run: |
          df -hT ${PWD}
          mkdir -p /home/runner/work/_actions/ophub/amlogic-s9xxx-armbian/main/compile-kernel
          ln -sf /builder/config /home/runner/work/_actions/ophub/amlogic-s9xxx-armbian/main/compile-kernel/config
          echo "status=success" >> ${GITHUB_OUTPUT}
          
      - name: Create config file
        run: |
          touch /builder/config
      - name: Download kmod metadata
        run: |
          if [[ -n "${{ github.repository }}" ]]; then
            actions/checkout@v4
            cp .github/workflows/Packages.manifest Packages.manifest
          else
            echo "::error::Cannot get Packages.manifest from shell: ${{ github.repository }} is not set."
            exit 1
          fi
          
      - name: Analyze kernel metadata
        run: |
          kernel_version=$(grep -oP 'kernel_version="\K[^"]+' Packages.manifest)
          release_version=$(grep -oP 'release_version="\K[^"]+' Packages.manifest)
          md5=$(grep -oP 'md5="\K[^"]+' Packages.manifest)
          echo "::set-output name=kernel_version::$kernel_version"
          echo "::set-output name=release_version::$release_version"
          echo "::set-output name=md5::$md5"
      - name: Generate OpenWrt kernel image
        run: |
         make INSTALL_HDR_PATH=output ARCH=arm64 INSTALL_MOD_PATH=output/modules dtbs KCONFIG_CONFIG=kernel-config/release/openwrt INSTALL_DTBS_PATH=output/dtbs INSTALL_VMLINUZ_PATH=output/vmlinuz modules_install install dtbs install vmlinuz_install KVERSION=${{ needs.analyze_metadata.outputs.kernel_version }}
         
      - name: Upload Kernel to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS }} == 'success' && !cancelled()
        with:
          tag: kernel_stable
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

