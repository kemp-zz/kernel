
name: test

on:
  repository_dispatch:
  workflow_dispatch:

env:
  TZ: America/New_York

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # Initialize environment (omitted for brevity)

      - name: Create simulated physical disk
        id: disk
        run: |
          # Create simulated physical disk (omitted for brevity)

      - name: Create a mapped directory
        id: mapped
        working-directory: /builder
        run: |
          # Create a mapped directory (omitted for brevity)

      - name: Download kmod metadata
        run: |
          curl -o Packages.manifest https://downloads.immortalwrt.org/snapshots/targets/armsr/armv8/kmods/6.1.86-1-58955783205c88e28ca2f240287756a0/Packages.manifest

      - name: Analyze kernel metadata
        run: |
          kernel_version=$(grep -oP 'kernel_version="\K[^"]+' Packages.manifest)
          release_version=$(grep -oP 'release_version="\K[^"]+' Packages.manifest)
          md5=$(grep -oP 'md5="\K[^"]+' Packages.manifest)

          echo "::set-output name=kernel_version::$kernel_version"
          echo "::set-output name=release_version::$release_version"
          echo "::set-output name=md5::$md5"

      - name: Compile kernel
        run: |
          # Compile kernel using the analyzed metadata (omitted for brevity)

      - name: Generate OpenWrt kernel image
        run: |
          make INSTALL_HDR_PATH=output ARCH=arm64 INSTALL_MOD_PATH=output/modules dtbs KCONFIG_CONFIG=kernel-config/release/openwrt INSTALL_DTBS_PATH=output/dtbs INSTALL_VMLINUZ_PATH=output/vmlinuz modules_install install dtbs install vmlinuz_install

      - name: Upload Kernel to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS }} == 'success' && !cancelled()
        with:
          tag: kernel_stable
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
